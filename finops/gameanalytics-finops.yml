description: >-
  FinOps view of GameAnalytics spend. Core game analytics - event collection via
  the Collection API, dashboards, retention, funnels, and monetization/ads
  reporting - is free. Cost is incurred through the PipelineIQ product line:
  programmatic Metrics API access, the Organization API, and raw Data Export
  streaming of JSON events to the customer's own cloud, priced by data volume
  and features and quoted by sales. Downstream cloud storage and warehouse costs
  (AWS S3, Google BigQuery, Google Cloud Storage) accrue in the customer's own
  cloud account, not on a GameAnalytics invoice.
notes: >-
  GameAnalytics does not publish fixed per-event or per-query list prices for
  PipelineIQ; model spend from the negotiated contract and from the customer's
  own cloud egress/storage/warehouse bills for Data Export. Verify packaging
  during reconciliation.
