meters:
- name: collected_events
  description: Game events ingested via the Collection API or SDKs. Free on the core platform.
  unit: events
  aggregation: sum
  dimensions:
  - organization
  - game
  - platform
- name: metrics_api_queries
  description: Aggregated metric queries against the Metrics API (PipelineIQ).
  unit: queries
  aggregation: sum
  dimensions:
  - organization
  - game
  - metric
- name: exported_events
  description: Raw JSON events streamed out via Data Export (PipelineIQ) to the customer's cloud.
  unit: events
  aggregation: sum
  dimensions:
  - organization
  - game
  - destination
- name: customer_cloud_storage
  description: Storage and warehouse cost for exported events, billed by the customer's own cloud provider (S3, BigQuery, GCS).
  unit: gigabytes
  aggregation: sum
  dimensions:
  - organization
  - destination
principles:
- name: Visibility
  description: Separate the free GameAnalytics platform usage from paid PipelineIQ contract spend and from downstream cloud storage/warehouse bills.
- name: Allocation
  description: Tag games/studios and Data Export destinations to internal cost centers; attribute cloud-side costs back to the exporting game.
- name: Optimization
  description: Stay on the free tier where dashboards suffice; scope Data Export to needed event types and destinations; batch and gzip collection traffic; right-size warehouse ingestion.
- name: Accountability
  description: Assign owners per game/pipeline; review PipelineIQ contract utilization and cloud egress/storage monthly against budget.
